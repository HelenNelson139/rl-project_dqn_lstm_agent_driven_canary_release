apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ai-dqn-decision
spec:
  args:
  - name: rollout-name
  - name: current-weight
  metrics:
  - name: ai-judgment
    interval: 30s # Tần suất truy vấn AI Agent
    provider:
      webhook:
        url: "http://canary-ai-agent-svc/predict"
        method: POST
        headers:
        - key: "Content-Type"
          value: "application/json"
        jsonPayload:
          history: [] # Cần tích hợp Prometheus client vào FastAPI để tự điền dữ liệu này [cite: 10, 48]
          app_info:
            name: "{{args.rollout-name}}"
            weight: "{{args.current-weight}}"
    # Thành công: Argo tiến tới bước (step) tiếp theo trong Rollout [cite: 2, 25]
    successCondition: "result.decision == 'Successful'"
    # Thất bại: Argo lập tức kích hoạt Rollback về phiên bản Stable [cite: 2, 28]
    failureCondition: "result.decision == 'Rollback'"
    # Lưu ý: Nếu result.decision là "Running", Argo sẽ đợi và kiểm tra lại sau 30 giây