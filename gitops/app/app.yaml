apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rl-canary-app
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/thuanthentran/dqn-lstm-agent-driven-canary-release.git
    targetRevision: main
    path: gitops/app/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    # Retry policy cho hết hạn image cleanup
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
